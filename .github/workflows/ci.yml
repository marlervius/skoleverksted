name: Skoleverksted CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MateMaTeX/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: MateMaTeX/frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  platform-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install "pydantic>=2.9" "fastapi>=0.115" "pytest>=8" "pyyaml>=6"
      - run: pytest -q Skoleverksted/backend/tests
      - run: python -m compileall -q Skoleverksted VGS_KI/backend ScriptoriumFOV/backend MateMaTeX/backend/app
      - run: docker build --check .

  deterministic-domain-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r MateMaTeX/backend/requirements.txt
      - run: pytest -q MateMaTeX/backend/tests/test_pipeline.py MateMaTeX/backend/tests/test_math_verifier.py MateMaTeX/backend/tests/test_content_quality.py MateMaTeX/backend/tests/test_text_sanitize.py
