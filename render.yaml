# Render Blueprint for the shared Skoleverksted backend.
# Secrets with `sync: false` are entered in the Render dashboard during setup.
services:
  - type: web
    name: skoleverksted-api
    runtime: docker
    repo: https://github.com/marlervius/skoleverksted.git
    branch: main
    region: frankfurt
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/ready
    autoDeployTrigger: checksPass
    disk:
      name: skoleverksted-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SKOLEVERKSTED_PUBLIC_FRONTEND_URL
        value: https://skoleverksted.vercel.app,https://skoleverksted-3npg.vercel.app
      - key: OUTPUT_DIR
        value: /var/data/output
      - key: SKOLEVERKSTED_DB_PATH
        value: /var/data/platform/skoleverksted.sqlite3
      - key: TYPST_PATH
        value: /usr/local/bin/typst
      - key: PDFLATEX_PATH
        value: /usr/bin/pdflatex
      - key: AI_TEMPERATURE
        value: "0.35"
      - key: GOOGLE_MODEL
        value: gemini-3.5-flash
      - key: PRIMARY_PROVIDER
        value: google
      - key: PRIMARY_MODEL
        value: gemini-3.5-flash
      - key: FALLBACK_PROVIDER
        value: google
      - key: FALLBACK_MODEL
        value: gemini-3.1-flash-lite
      - key: PROMPT_VERSION
        value: skoleverksted-v3
      - key: MAX_CONCURRENT_JOBS
        value: "1"
      - key: MAX_CONCURRENT_COMPILES
        value: "1"
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_IMAGE_MODEL
        value: gemini-3.1-flash-image
      - key: APP_PASSWORD
        sync: false
      - key: MATE_API_KEY
        # Shared with the server-side Vercel proxy. A generated value is unsafe
        # here because Blueprint sync cannot propagate it to Vercel.
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
