services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      OUTPUT_DIR: /var/data/output
      SKOLEVERKSTED_DB_PATH: /var/data/platform/skoleverksted.sqlite3
    volumes:
      - skoleverksted_data:/var/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
  frontend:
    build:
      context: ./MateMaTeX/frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  skoleverksted_data:
